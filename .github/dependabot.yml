version: 2
updates:
  # Rust dependencies (main project)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 10
    reviewers:
      - "bellini666"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      rust-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Rust dependencies (Zed extension)
  - package-ecosystem: "cargo"
    directory: "/extensions/zed-extension"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    reviewers:
      - "bellini666"
    commit-message:
      prefix: "deps(zed)"
      include: "scope"

  # npm dependencies (VSCode extension)
  - package-ecosystem: "npm"
    directory: "/extensions/vscode-extension"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 10
    reviewers:
      - "bellini666"
    commit-message:
      prefix: "deps(vscode)"
      include: "scope"
    ignore:
      # engines.vscode is our VSCodium support floor, not a dependency.
      # @types/vscode is pinned exactly to it; bump both by hand, together,
      # after checking github.com/VSCodium/vscodium/releases. See issue #144.
      - dependency-name: "@types/vscode"
      # typescript-eslint peer-caps typescript at <6.1.0, so TS7 breaks
      # npm install. Drop this once typescript-eslint supports TS7.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Gradle dependencies (IntelliJ plugin)
  - package-ecosystem: "gradle"
    directory: "/extensions/intellij-plugin"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    reviewers:
      - "bellini666"
    commit-message:
      prefix: "deps(intellij)"
      include: "scope"

  # pip dependencies (Python dev tools)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    reviewers:
      - "bellini666"
    commit-message:
      prefix: "deps(python)"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    reviewers:
      - "bellini666"
    commit-message:
      prefix: "ci"
      include: "scope"
