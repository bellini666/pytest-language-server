# Dependency Review configuration
# https://docs.github.com/en/code-security/supply-chain-security/understanding-your-software-supply-chain/dependency-review-action-configuration-options

fail_on_severity: moderate

license_check: true

allow_licenses:
  - MIT
  - Apache-2.0
  - BlueOak-1.0.0
  - BSD-2-Clause
  - BSD-3-Clause
  - ISC
  - MPL-2.0
  - Unlicense
  - 0BSD
  - CC0-1.0
  - Zlib
  - CC-BY-4.0
  - Python-2.0
  - Unicode-3.0
  - Unicode-DFS-2016
  - BSL-1.0

# rustpython-ast is published under MIT (see its Cargo.toml), but GitHub's
# dependency graph reports its license as unknown, so exempt it explicitly.
allow_dependencies_licenses:
  - pkg:cargo/rustpython-ast

comment_summary_in_pr: always
